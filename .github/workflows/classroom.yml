name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: README exists
      id: readme-exists
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: README exists
        setup-command: ''
        command: ls README.md
        input: ''
        expected-output: README.md
        comparison-method: exact
        timeout: 10
        max-score: 1
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        README-EXISTS_RESULTS: "${{steps.readme-exists.outputs.result}}"
      with:
        runners: readme-exists
